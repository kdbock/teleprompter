name: team_teleprompter
description: Team-based teleprompter for content creators
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # JSON Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI Components
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0
  http: ^1.2.2
  
  # Auth
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1
  
  # Voice Recognition
  speech_to_text: ^7.4.0
  
  # Camera/Recording
  camera: ^0.10.5+9
  video_player: ^2.8.2
  path_provider: ^2.1.2
  gal: ^2.3.1
  
  # Routing
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  
  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  # Fonts - Using Google Fonts package instead of local fonts
  # Uncomment and add font files when needed for offline support
  # fonts:
  #   - family: PrompterMono
  #     fonts:
  #       - asset: assets/fonts/RobotoMono-Regular.ttf
  #       - asset: assets/fonts/RobotoMono-Bold.ttf
  #         weight: 700
